  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --cc-magenta:      #D8016A;
      --cc-orange:       #FF6514;
      --cc-blue:         #1A0AE6;
      --cc-indigo:       #361C76;
      --cc-magenta-tint: #FBE0EC;

      --cc-paper:        #F7F5FA;
      --cc-paper-soft:   #F2EFF7;
      --cc-white:        #FBFAFD;

      --cc-ink:    #1A1130;
      --cc-ink-2:  #322847;
      --cc-ink-3:  #6A6378;
      --cc-ink-4:  #9C97A8;
      --cc-rule:        #D2CDDB;
      --cc-rule-soft:   #E5E1ED;

      --fg-1: var(--cc-ink);
      --fg-2: var(--cc-ink-2);
      --fg-3: var(--cc-ink-3);

      --font-serif: "EB Garamond", "Iowan Old Style", Charter, Georgia, serif;

    body {

      color: var(--fg-1);
      font-family: var(--font-sans);

      line-height: 1.55;

      text-rendering: optimizeLegibility;

    a { color: var(--cc-ink); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; transition: text-decoration-thickness var(--dur-1) var(--ease); }

    em { font-family: var(--font-serif); font-style: italic; }

    .cc-shell {

    .cc-header {

      font-weight: 400;

      color: var(--cc-ink);

    .cc-article-body a {

    .cc-article-body ul, .cc-article-body ol {

      font-family: var(--font-sans);

      color: var(--fg-2);

    .cc-article-body hr {

  <script>
    var BASE = 'https://creativeconviction.github.io/creative-conviction/';
    var MD = "In the late 80s and early 90s, graphic design went through an unprecedented shift. The introduction of desktop publishing tools, such as Aldus PageMaker for the Macintosh in 1985 and Adobe Illustrator (1987) and Photoshop (1990), collapsed the technical barriers to producing visual work. Tasks that once required specialized typesetters, print shops, and production expertise could suddenly be rendered by anyone with a computer. Conventional wisdom suggested designers would vanish. Instead, these tools lowered the barriers to creating visual content, which grew the market for designers.\n\nA decade later, marketing faced a similar inflection point with the rise of the internet and social media platforms in the 2000s. [Distribution](https://www.bvp.com/atlas/investor-field-notes-distribution-and-conversion-models-for-consumer-startups), once scarce and expensive to access through highly mature channels like television and print, became free and widely accessible as the Internet emerged as a new channel without large gatekeepers in its early days. This new channel created a need for new specialists. Content marketers emerged at early blogs and startups, while companies like Facebook and Dropbox pioneered the role of the growth marketer. The focus of marketing departments evolved from expensive ad spend to strategic brand narratives and content creation. The reduction in execution costs expanded the creative surface area rather than contracting it.\n\nThe narrative dominating today's conversation around AI is largely one of subtraction, in which we fixate on code generation replacing junior engineers or on automation reducing back-office staff. While every major technological shift indeed rocks the existing org chart, history suggests disruption creates more than it destroys, and we think this pattern will be pronounced in creative disciplines. Just as desktop publishing created brand designers and the internet created new types of marketers, the AI era is already producing new creative roles and tooling that will influence how we work, innovate, and play for decades to come. When process and generation are commoditized, taste and judgment \u2014 or creative conviction \u2014 becomes vital.\n\n<div class=\"img-placeholder\" data-label=\"Hero editorial \u2014 creative conviction visual\" data-src=\"cc v2.png\"></div>\n\n## New dynamics for founders and creative teams\n\nThe composition of founding teams is changing. We're seeing a surge of entrepreneurs with creative, non-technical backgrounds empowered by AI to write the code necessary to bring their startups to life. We've also noticed the urgency to hire \"Founding Designers\" across all types of AI startups. The job market also reflects this shift, with design openings climbing (up [13%](https://adplist.substack.com/p/state-of-the-design-job-market-in) from 2024). We're also seeing entirely new hybrid design roles emerging as well, from the rise of the \"Design Engineer\" that has become popularized by companies like Facebook, Vercel, and Netflix, to the \"[Model Designer](https://www.aidesignfieldguide.com/)\" being pioneered by creatives at Figma.\n\nFor later-stage companies, we're noticing a pattern where CEOs are calling for a complete restructure of their design functions under C-suite leadership. At Shopify, [Tobi urgently called Carl Rivera](https://www.youtube.com/watch?v=qUoIfw5R-iE) in 2025 to revive and lead the design organization, while also simplifying titles to just \"designer\" or \"writer\" and re-focusing on craft and ambition. Stripe has adopted a similar approach, treating \"design as design\" by housing product, brand, marketing, creative, user research, and content all under one pillar and executive leader. Airbnb is another example \u2014 at [Config 2023](https://www.youtube.com/watch?v=Dkfijg7s76o), Brian Chesky told the audience that Airbnb had eliminated its product management function, with everything now running through design.\n\nIn the future, we believe the role of the designer will look less like a discrete function and more like a foundational capability threaded through the entire company. The best designers will no longer sit downstream of product decisions; they will shape those decisions directly, moving at the speed of engineers while knowing when to slow things down. Designers who focus solely on the drawing board or shipping component libraries will be challenged by a new generation of designers who see the true form of the product, both present and future, and who tweak it across layers using storytelling, code, and imagery.\n\nWithin organizations, we expect design to consolidate from a support function into a strategic one: fewer handoffs, more ownership, and a direct line to the CEO. The title may simplify, but the scope will expand. What gets called \"design\" tomorrow will encompass taste, narrative, product intuition, and brand in ways that blur every boundary we've drawn around the discipline today.\n\n## AI's impact on creative tooling\n\nThe proliferation of new tooling has fundamentally expanded and augmented the bounds of creativity. We view the impact of AI on creative work in three distinct areas:\n\n- **Product design**: Tools like [Paper](http://paper.design), [Cursor](http://cursor.com), and [Dessn](http://dessn.ai) are allowing designers to prototype, ship code all the way through to production, and collapse the timelines between problem, idea, and reality. As we've previously noted, [the rise of design engineers is already underway](https://www.bvp.com/atlas/ai-powered-rd-vibecoding-taste-and-the-evolution-of-full-stack-design#3-AI-is-driving-the-rise-of-the-design-engineer-role), and there's an opportunity for founders to build tooling that demonstrates this function.\n\n- **Brand and visual marketing**: Platforms like [Canva](http://canva.com), [Flora](http://flora.ai), and [Reve](https://app.reve.com/) are modernizing horizontal creative workflows, enabling teams to generate high-fidelity assets from animations to interactive decks without the traditional bottlenecks. Every company has a brand, and those that can express it at scale without losing authenticity or coherence will outperform, which is exactly where we think the next wave of tooling matters most.\n\n- **Consumer play**: Platforms are emerging where the creation itself is the entertainment, not just a means to an end. Users build \"gizmos\" on [Gizmo](http://gizmo.party), generate songs on [Suno](http://suno.com), or have hour-long conversations with [Tolan](http://tolans.com) purely for the joy of making, sharing, or stepping into other worlds. These companies invest heavily in brand and narrative because the emotional promise to consumers is just as important as their technical capability. Successful consumer-facing companies realize that the product is a feeling as much as a feature set.\n\n<div class=\"img-placeholder\" data-label=\"AI creative tooling landscape \u2014 product, brand, consumer play\" data-src=\"market map v2.png\"></div>\n\n## Defining creative conviction\n\nCreative conviction combines two forces: the power and ambition to create something new and a firmly held belief in what you're creating. It's about standing for specificity, making opinionated choices, and designing for emotional connection. It's rooted in subjectivity and is difficult to teach \u2014 something AI doesn't handle well. As investors, we've honed our ability to identify this in entrepreneurs and companies. When we backed Pinterest in 2010, Ben Silbermann's and Evan Sharp's obsession with design was a primary reason we invested.\n\nIt's also why other consumer internet winners (e.g., Airbnb, Shopify) pulled ahead despite operating in crowded markets. Airbnb's \"Belong Anywhere\" ethos wasn't just marketing; it was embedded in product decisions, such as lush photography that showcased homes as aspirational destinations, highlighting neighborhood guides and encouraging hosts to share local recommendations. Shopify made design choices that treated store owners as creators and fostered experiences like one-click checkout and mobile-first storefronts that made selling feel accessible and inspirational.\n\nWe're already observing this pattern in the AI-native startups we back, too. [Legora](https://www.bvp.com/news/building-legoras-collaborative-ai-platform-for-legal-workflow-automation)'s customers assess which team ships innovations first and at the highest velocity, whose execution quality is superior, and which leadership team sees the future more creatively. When law firms evaluate legal AI platforms, they're not just comparing feature sets in today's products; they're betting on tomorrow's creative edge. What these [category-defining businesses](https://www.bvp.com/atlas/consumer-earthquake-startups) share is the ability to create visceral, emotional reactions; value propositions so stunning, they become etched into pop culture. As AI commoditizes execution, creative conviction commands a premium. It's hard to explain, impossible to fake, and that's exactly why it's valuable.\n\nThis is just the beginning of our evolving thesis on an emerging creative tech stack. In that spirit, we'll be doing a three-part deep dive into product design, brand and marketing, and consumer play. We'll explore how the best teams are working, which tools actually matter, and why creative conviction remains an overlooked moat in a world where everyone has access to the same models.\n\n*This perspective was authored by Libbie Frost and Rayouf Alhumedhi, with reviews and edits from Partners Jeremy Levine and Lauri Moore, including Atlas Editors. If you are building in the creative tooling space, reach out directly to lfrost@bvp.com and ralhumedhi@bvp.com.*\n";

    marked.use({ breaks: false, gfm: true });
    var bodyEl = document.getElementById('cc-article-body');
    bodyEl.innerHTML = marked.parse(MD);

    // Apply article-body classes via wrappers, then replace img-placeholders.
    bodyEl.querySelectorAll('.img-placeholder').forEach(function (div) {
      var src = (div.dataset.src || '').replace(/ /g, '%20');
      var label = div.dataset.label || '';
      var img = document.createElement('img');
      img.src = BASE + src;
      img.alt = label;
      img.className = 'cc-article-img';
      var cap = document.createElement('p');
      cap.className = 'cc-article-caption';
      cap.textContent = label;
      div.replaceWith(img, cap);
    });
