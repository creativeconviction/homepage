<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />

  <title>Hiring lists — Creative Conviction</title>
  <meta name="description" content="Companies in the Creative Conviction orbit that are hiring creative and technical talent." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=Inter:wght@400..700&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --cc-magenta:   #D8016A;
      --cc-indigo:    #361C76;

      --cc-paper:        #F7F5FA;
      --cc-paper-soft:   #F2EFF7;
      --cc-white:        #FBFAFD;

      --cc-ink:    #1A1130;
      --cc-ink-2:  #322847;
      --cc-ink-3:  #6A6378;
      --cc-ink-4:  #9C97A8;
      --cc-rule:        #D2CDDB;
      --cc-rule-soft:   #E5E1ED;

      --fg-1: var(--cc-ink);
      --fg-2: var(--cc-ink-2);
      --fg-3: var(--cc-ink-3);

      --font-serif: "EB Garamond", "Iowan Old Style", Charter, Georgia, serif;
      --font-sans:  "Inter", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;

      --ease: cubic-bezier(.2,.6,.2,1);
      --dur-1: 120ms;
      --dur-2: 220ms;
    }

    body {
      background: var(--cc-paper);
      color: var(--fg-1);
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
    }

    a { color: var(--cc-ink); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; transition: text-decoration-thickness var(--dur-1) var(--ease); }
    a:hover { text-decoration-thickness: 2px; }
    em { font-family: var(--font-serif); font-style: italic; }

    .cc-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 40px 80px;
    }

    .cc-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 22px;
      margin-bottom: 80px;
    }
    .cc-mark {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--cc-ink);
      text-decoration: none;
      line-height: 1;
    }
    .cc-mark em { font-style: italic; color: var(--cc-magenta); font-family: var(--font-serif); }
    .cc-nav { display: flex; gap: 28px; }
    .cc-nav-link {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--fg-2);
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: color var(--dur-1) var(--ease), text-decoration-thickness var(--dur-1) var(--ease);
    }
    .cc-nav-link:hover { color: var(--cc-ink); text-decoration-thickness: 2px; }

    .cc-page { max-width: 820px; margin: 0; }

    .cc-page-header { margin-bottom: 56px; }
    .cc-page-title {
      font-family: var(--font-serif);
      font-size: clamp(22px, 2.75vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--cc-ink);
      margin: 0 0 16px;
    }
    .cc-page-dek {
      font-family: var(--font-serif);
      font-size: 19px;
      line-height: 1.5;
      color: var(--fg-2);
      max-width: 600px;
      margin: 0;
    }

    /* Archive list */
    .cc-archive-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .cc-archive-item {
      border-top: 1px solid var(--cc-rule);
      padding: 20px 0;
    }
    .cc-archive-item:last-child {
      border-bottom: 1px solid var(--cc-rule);
    }
    .cc-archive-link {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      text-decoration: none;
      color: var(--cc-ink);
    }
    .cc-archive-link:hover .cc-archive-title {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }
    .cc-archive-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      line-height: 1.2;
    }
    .cc-archive-date {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--fg-3);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .cc-footer {
      padding-top: 32px;
      margin-top: 96px;
    }
    .cc-footer-meta {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--fg-3);
      letter-spacing: 0.02em;
    }

    @media (max-width: 640px) {
      .cc-shell { padding: 24px 24px 64px; }
      .cc-header { margin-bottom: 56px; }
      .cc-page-header { margin-bottom: 36px; }
      .cc-archive-link { flex-direction: column; gap: 4px; }
    }
  </style>
</head>

<body>
  <div class="cc-shell">

    <header class="cc-header">
      <a class="cc-mark" href="../">Creative <em>Conviction</em></a>
      <nav class="cc-nav">
        <a class="cc-nav-link" href="../about.html">About</a>
      </nav>
    </header>

    <main class="cc-page">

      <div class="cc-page-header">
        <h1 class="cc-page-title">Hiring lists</h1>
      </div>

      <ul class="cc-archive-list">

        <li class="cc-archive-item">
          <a class="cc-archive-link" href="june-16-2026/">
            <span class="cc-archive-title">10 nyc based companies hiring design or product engineers</span>
            <span class="cc-archive-date">June 16, 2026</span>
          </a>
        </li>

        <li class="cc-archive-item">
          <a class="cc-archive-link" href="june-4-2026/">
            <span class="cc-archive-title">Startups who are hiring for product designers based in nyc</span>
            <span class="cc-archive-date">June 4, 2026</span>
          </a>
        </li>

      </ul>

    </main>

    <footer class="cc-footer">
      <p class="cc-footer-meta">&copy; 2026 Creative Conviction</p>
    </footer>

  </div>
</body>
</html>
