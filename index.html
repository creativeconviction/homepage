<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Creative Conviction</title>
  <meta name="description" content="We seek to spark conversation around capital, creative work, and AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff8f1;
      --text: #20124d;
      --muted: rgba(32, 18, 77, 0.38);
      --thumb: rgba(20, 10, 50, 0.88);
      --quote-bg: rgba(32, 18, 77, 0.09);
    }

    /* ── TERMINAL ── */
    body.terminal {
      --bg: #000;
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.4);
      --thumb: rgba(255, 255, 255, 0.07);
      --quote-bg: rgba(255, 255, 255, 0.12);
    }
    body.terminal, body.terminal * {
      font-family: 'Courier New', Courier, monospace !important;
    }
    body.terminal::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
    body.terminal { font-size: 0.8rem; }
    body.terminal .hero { padding: 1.25rem 2rem 0.75rem; }
    body.terminal .hero-tagline { font-size: 0.7rem; line-height: 1.2; }
    body.terminal .filters { padding: 0 2rem 0.85rem; }
    body.terminal .card-list { gap: 0.5rem; }
    body.terminal .card-title { font-size: 0.8rem; line-height: 1.2; }
    body.terminal .card-desc { font-size: 0.7rem; line-height: 1.2; }
    body.terminal .card-date { font-size: 0.6rem; }
    body.terminal .signup { margin-top: 2rem; }
    body.terminal .signup-title { font-size: 1rem; margin-bottom: 0.75rem; }
    body.terminal footer { margin-top: 2rem; }
    body.terminal .card-thumb { border-color: rgba(255,255,255,0.25); }
    body.terminal .filter-btn.active::before { content: '> '; }
    body.terminal .corner { border-color: rgba(255,255,255,0.25); }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* CORNER MARKS */
    .corner {
      position: fixed;
      width: 16px;
      height: 16px;
      pointer-events: none;
      z-index: 50;
    }
    .corner-tl { top: 1.25rem; left: 1.25rem; border-top: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner-tr { top: 1.25rem; right: 1.25rem; border-top: 1px solid var(--muted); border-right: 1px solid var(--muted); }
    .corner-bl { bottom: 1.25rem; left: 1.25rem; border-bottom: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner-br { bottom: 1.25rem; right: 1.25rem; border-bottom: 1px solid var(--muted); border-right: 1px solid var(--muted); }

    /* NAV */
    nav {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.75rem 2rem 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1.25rem;
    }

    .terminal-toggle {
      background: none;
      border: 1px solid var(--muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.6875rem;
      color: var(--muted);
      padding: 0.2rem 0.5rem;
      letter-spacing: 0.05em;
      transition: color 0.15s, border-color 0.15s;
      line-height: 1.7;
    }
    .terminal-toggle:hover { color: var(--text); border-color: var(--text); }

    .nav-about {
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-about:hover { color: var(--text); }

    /* HERO */
    .hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 2.75rem;
      text-align: center;
    }
